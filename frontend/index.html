<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier App: User Validator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>User Validator</h1>
            <p>Verify records against our database.</p>
        </header>

        <form id="checkForm">
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Alice" />
            </div>

            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" required placeholder="e.g. 25" min="0" />
            </div>

            <div class="input-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit" class="primary-btn">
                <span>Check Database</span>
                <div class="loader hidden"></div>
            </button>
        </form>

        <div id="result" class="result-card hidden">
            <!-- Result will be injected here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
